name: Build Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            runner: macos-latest
            target: bun-darwin-arm64
            out: streamline-macos-arm64

          - label: macos-x64
            runner: macos-13
            target: bun-darwin-x64
            out: streamline-macos-x64

          - label: linux-x64
            runner: ubuntu-latest
            target: bun-linux-x64
            out: streamline-linux-x64

          - label: windows-x64
            runner: windows-latest
            target: bun-windows-x64
            out: streamline-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Build frontend
        run: bun run build

      - name: Compile binary
        run: |
          mkdir -p binaries
          bun build \
            --compile \
            --target ${{ matrix.target }} \
            --outfile binaries/${{ matrix.out }} \
            server/index.js
        shell: bash

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/${{ matrix.out }}
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checksums:
    name: Generate checksums
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.release.tag_name || inputs.tag }}
          out-file-path: release-assets
          fileName: "*"

      - name: Generate SHA-256 checksums
        run: |
          cd release-assets
          sha256sum streamline-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/SHA256SUMS.txt
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
